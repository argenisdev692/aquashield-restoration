[phases.setup]
nixPkgs = ["nodejs_20", "php85", "php85Extensions.composer", "php85Extensions.dom", "php85Extensions.fileinfo", "php85Extensions.gd", "php85Extensions.exif", "php85Extensions.mbstring", "php85Extensions.pcntl", "php85Extensions.pdo", "php85Extensions.pdo_pgsql", "php85Extensions.pdo_sqlite", "php85Extensions.sqlite3", "php85Extensions.tokenizer", "php85Extensions.xml", "php85Extensions.curl", "php85Extensions.zip", "php85Extensions.bcmath", "php85Extensions.intl", "php85Extensions.ctype", "php85Extensions.filter", "php85Extensions.hash", "php85Extensions.json", "php85Extensions.openssl", "php85Extensions.session", "php85Extensions.simplexml", "php85Extensions.sodium", "php85Extensions.xmlwriter", "php85Extensions.redis", "netcat", "redis"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci --production=false",
    "npm run build"
]

[phases.build.cacheOnPaths]
["node_modules/.cache"] = "node_modules/.cache"
["vendor"] = "vendor"

[start]
cmd = "chmod +x start.sh && ./start.sh"

[variables]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "errorlog"
LOG_LEVEL = "error"
SESSION_DRIVER = "cookie"
CACHE_STORE = "redis"
QUEUE_CONNECTION = "redis"
VITE_APP_NAME = "AquaShield"
NODE_ENV = "production"
DB_CONNECTION = "pgsql"
DB_PORT = "5432"
DB_SSLMODE = "require"
