[phases.setup]
nixPkgs = ["nodejs_20", "php", "phpPackages.composer", "phpPackages.dom", "phpPackages.fileinfo", "phpPackages.gd", "phpPackages.exif", "phpPackages.mbstring", "phpPackages.pcntl", "phpPackages.pdo", "phpPackages.pdo_pgsql", "phpPackages.pdo_sqlite", "phpPackages.sqlite3", "phpPackages.tokenizer", "phpPackages.xml", "phpPackages.curl", "phpPackages.zip", "phpPackages.bcmath", "phpPackages.intl", "phpPackages.ctype", "phpPackages.filter", "phpPackages.hash", "phpPackages.json", "phpPackages.openssl", "phpPackages.session", "phpPackages.simplexml", "phpPackages.sodium", "phpPackages.xmlwriter", "phpPackages.redis", "netcat", "redis"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci --production=false",
    "npm run build"
]

[phases.build.cacheOnPaths]
"node_modules/.cache" = "node_modules/.cache"
"vendor" = "vendor"

[start]
cmd = "chmod +x start.sh && ./start.sh"

[variables]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "errorlog"
LOG_LEVEL = "error"
SESSION_DRIVER = "cookie"
CACHE_STORE = "redis"
QUEUE_CONNECTION = "redis"
VITE_APP_NAME = "AquaShield"
NODE_ENV = "production"
DB_CONNECTION = "pgsql"
DB_PORT = "5432"
DB_SSLMODE = "require"
